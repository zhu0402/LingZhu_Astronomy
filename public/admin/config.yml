backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/assets"
public_folder: "assets"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "English Site Text"
        name: "site_en"
        file: "src/content/editable.en.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - label: "Subtitle"
                name: "subtitleStructure"
                widget: "list"
                fields:
                  - { label: "Text", name: "text", widget: "text" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false }
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Section Title", name: "sectionTitle", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Core Fields"
                name: "coreFields"
                widget: "list"
                field: { label: "Field", name: "field", widget: "string" }
          - label: "Opportunities"
            name: "opportunities"
            widget: "object"
            fields:
              - { label: "Section Title", name: "sectionTitle", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Email Label", name: "emailLabel", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - label: "Brand"
                name: "brand"
                widget: "object"
                fields:
                  - { label: "Line 1", name: "line1", widget: "string" }
                  - { label: "Line 2", name: "line2", widget: "string", required: false }
                  - { label: "Organization Name", name: "orgName", widget: "string" }
                  - { label: "Address", name: "address", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string", required: false }

      - label: "Chinese Site Text"
        name: "site_zh"
        file: "src/content/editable.zh.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - label: "Subtitle"
                name: "subtitleStructure"
                widget: "list"
                fields:
                  - { label: "Text", name: "text", widget: "text" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false }
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Section Title", name: "sectionTitle", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Core Fields"
                name: "coreFields"
                widget: "list"
                field: { label: "Field", name: "field", widget: "string" }
          - label: "Opportunities"
            name: "opportunities"
            widget: "object"
            fields:
              - { label: "Section Title", name: "sectionTitle", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Email Label", name: "emailLabel", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - label: "Brand"
                name: "brand"
                widget: "object"
                fields:
                  - { label: "Line 1", name: "line1", widget: "string" }
                  - { label: "Line 2", name: "line2", widget: "string", required: false }
                  - { label: "Organization Name", name: "orgName", widget: "string" }
                  - { label: "Address", name: "address", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string", required: false }

  - name: "members"
    label: "Members"
    files:
      - label: "English Members"
        name: "members_en"
        file: "src/content/members.en.json"
        format: "json"
        fields:
          - label: "Faculty"
            name: "faculty"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Primary Name", name: "primaryName", widget: "string" }
              - { label: "Secondary Name", name: "secondaryName", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "CV Link", name: "cvLink", widget: "string", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Direction", name: "direction", widget: "text", required: false }
          - label: "Postdocs and Students"
            name: "postdocsAndStudents"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Primary Name", name: "primaryName", widget: "string" }
              - { label: "Secondary Name", name: "secondaryName", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Direction", name: "direction", widget: "text", required: false }
          - label: "Former Members"
            name: "former"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Primary Name", name: "primaryName", widget: "string" }
              - { label: "Secondary Name", name: "secondaryName", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Destination", name: "destination", widget: "text", required: false }
              - { label: "Direction", name: "direction", widget: "text", required: false }

      - label: "Chinese Members"
        name: "members_zh"
        file: "src/content/members.zh.json"
        format: "json"
        fields:
          - label: "Faculty"
            name: "faculty"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Primary Name", name: "primaryName", widget: "string" }
              - { label: "Secondary Name", name: "secondaryName", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "CV Link", name: "cvLink", widget: "string", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Direction", name: "direction", widget: "text", required: false }
          - label: "Postdocs and Students"
            name: "postdocsAndStudents"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Primary Name", name: "primaryName", widget: "string" }
              - { label: "Secondary Name", name: "secondaryName", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Direction", name: "direction", widget: "text", required: false }
          - label: "Former Members"
            name: "former"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Primary Name", name: "primaryName", widget: "string" }
              - { label: "Secondary Name", name: "secondaryName", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Destination", name: "destination", widget: "text", required: false }
              - { label: "Direction", name: "direction", widget: "text", required: false }

  - name: "research"
    label: "Research"
    files:
      - label: "English Research"
        name: "research_en"
        file: "src/content/research.en.json"
        format: "json"
        fields:
          - label: "Research Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Authors", name: "authors", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Link", name: "link", widget: "string", required: false }

      - label: "Chinese Research"
        name: "research_zh"
        file: "src/content/research.zh.json"
        format: "json"
        fields:
          - label: "Research Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Authors", name: "authors", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Link", name: "link", widget: "string", required: false }

